services:
  nginx:
    build:
      context: .
      dockerfile: ./dockerfiles/nginx.dockerfile
    container_name: stockfolio_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - mysql
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: ./dockerfiles/app.dockerfile
    container_name: stockfolio_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: stockfolio_mysql
    env_file:
      - ./env/mysql.env
    ports:
      - "3306:3306"
    volumes:
      - stock_portfolio_mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  stock_portfolio_mysql_data: